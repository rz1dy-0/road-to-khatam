<!doctype html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Login Pensyarah - RTK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-purple-50">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
  <h1 class="text-2xl font-bold text-purple-700 mb-2">Login Pensyarah</h1>
  <p class="text-gray-500 mb-6">Sistem Road To Khatam Al-Quran</p>

  <form id="login-form" class="space-y-4">
    <input id="email" type="email" placeholder="Email" class="w-full border p-3 rounded-lg" required>
    <input id="password" type="password" placeholder="Password" class="w-full border p-3 rounded-lg" required>

    <button class="w-full bg-purple-700 text-white p-3 rounded-lg font-bold">
      Login
    </button>
  </form>

  <p id="msg" class="text-red-600 text-sm mt-4 hidden"></p>

  <div class="mt-5 text-sm text-gray-500">
    Demo: pensyarah@rtk.com / 123456
  </div>
</div>

<script>
document.getElementById("login-form").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(email === "pensyarah@rtk.com" && password === "123456"){
    localStorage.setItem("rtk_session", JSON.stringify({
      nama: "Pensyarah RTK",
      email,
      role: "pensyarah"
    }));

    window.location.href = "index.html";
  } else {
    const msg = document.getElementById("msg");
    msg.textContent = "Email atau password salah.";
    msg.classList.remove("hidden");
  }
});
</script>

</body>
</html>
